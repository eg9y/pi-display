; PlatformIO config — https://docs.platformio.org/page/projectconf.html
; Keeps the Arduino-style sketch folder so HARDWARE_GUIDE.md paths still work.

[platformio]
src_dir = sketch_apr11a

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit NeoPixel
    bblanchon/ArduinoJson
    links2004/WebSockets
